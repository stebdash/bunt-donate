<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ВАЖЛИВО: прозорий фон для OBS */
  body {
    background: transparent !important;
    width: 600px;
    height: 160px;
    overflow: hidden;
    font-family: sans-serif;
  }

  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&family=Mulish:wght@500;600&display=swap');

  .alert {
    position: absolute;
    bottom: 16px;
    left: 16px;
    right: 16px;
    background: linear-gradient(135deg, rgba(10,10,18,0.97), rgba(20,20,32,0.97));
    border: 1px solid rgba(32,57,212,0.6);
    border-radius: 16px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow:
      0 0 32px rgba(32,57,212,0.25),
      0 8px 24px rgba(0,0,0,0.7);

    /* початковий стан — прихований */
    transform: translateY(120px);
    opacity: 0;
    transition: transform 0.5s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.35s ease;
  }

  .alert.show {
    transform: translateY(0);
    opacity: 1;
  }

  .alert.hide {
    transform: translateY(120px);
    opacity: 0;
    transition: transform 0.4s ease-in, opacity 0.3s ease;
  }

  /* Ліва синя смужка */
  .alert::before {
    content: '';
    position: absolute;
    left: 0; top: 12px; bottom: 12px;
    width: 3px;
    background: linear-gradient(180deg, #2039D4, #F5A800);
    border-radius: 0 2px 2px 0;
  }

  .icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2039D4, #1530b0);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 0 16px rgba(32,57,212,0.5);
  }

  .content { flex: 1; min-width: 0; }

  .top-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 3px;
  }

  .donor-name {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: #F5A800;
    white-space: nowrap;
    margin-left: 10px;
    letter-spacing: 0.05em;
  }

  .message {
    font-family: 'Mulish', sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Прогрес-бар */
  .progress {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 0 0 16px 16px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #2039D4, #F5A800);
    transform-origin: left;
    transform: scaleX(1);
  }
  .progress-bar.run {
    animation: shrink linear forwards;
  }
  @keyframes shrink {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }

  /* Тест-кнопка (тільки для перевірки, невидима в OBS) */
  #testBtn {
    position: fixed;
    top: 4px; right: 4px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 4px;
    cursor: pointer;
    z-index: 999;
  }
</style>
</head>
<body>

<!-- Кнопка для тесту (в OBS вона мала і не заважає) -->
<button id="testBtn" onclick="testAlert()">TEST</button>

<div class="alert" id="alert">
  <div class="icon">💙</div>
  <div class="content">
    <div class="top-row">
      <span class="donor-name" id="donorName">Анонім</span>
      <span class="amount" id="donorAmount">₴100</span>
    </div>
    <div class="message" id="donorMessage">Дякую за стрім!</div>
  </div>
  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<script>
  // ====== КОНФІГ ======
  const SERVER_URL = 'https://bunt-donate-production.up.railway.app'; // ← замінити після деплою
  const DISPLAY_SECONDS = 7;
  // ====================

  let queue = [];
  let isShowing = false;

  function showDonation(data) {
    queue.push(data);
    if (!isShowing) processQueue();
  }

  function processQueue() {
    if (queue.length === 0) { isShowing = false; return; }
    isShowing = true;

    const data = queue.shift();
    const alert = document.getElementById('alert');
    const bar = document.getElementById('progressBar');

    document.getElementById('donorName').textContent = data.name || 'Анонім';
    document.getElementById('donorAmount').textContent = `₴${data.amount}`;
    document.getElementById('donorMessage').textContent = data.message || '💙';

    // Показати
    alert.classList.remove('hide');
    alert.classList.add('show');

    // Запустити прогрес-бар
    bar.classList.remove('run');
    bar.style.animationDuration = '';
    void bar.offsetWidth; // reflow
    bar.style.animationDuration = DISPLAY_SECONDS + 's';
    bar.classList.add('run');

    // Сховати
    setTimeout(() => {
      alert.classList.remove('show');
      alert.classList.add('hide');
      setTimeout(processQueue, 500);
    }, DISPLAY_SECONDS * 1000);
  }

  // Тест-функція — перевіряй прямо в OBS
  function testAlert() {
    showDonation({
      name: 'Тестовий Донатер',
      amount: 250,
      message: 'Привіт з тесту! Все працює 🔥'
    });
  }

  // SSE підключення до сервера
  // (вмикається автоматично якщо SERVER_URL замінений)
  function connectSSE() {
    if (SERVER_URL.includes('YOUR-SERVER')) return; // пропустити якщо не налаштовано

    const es = new EventSource(`${SERVER_URL}/events`);
    es.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'donation') showDonation(data);
      } catch(err) {}
    };
    es.onerror = () => {
      es.close();
      setTimeout(connectSSE, 3000);
    };
  }

  connectSSE();
</script>
</body>
</html>
