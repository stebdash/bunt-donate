<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: transparent;
  width: 600px;
  height: 160px;
  overflow: hidden;
}

#alert {
  position: absolute;
  bottom: 12px;
  left: 12px;
  right: 12px;
  background: rgba(8, 8, 20, 0.95);
  border: 2px solid #2039D4;
  border-radius: 14px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  transform: translateY(200px);
  opacity: 0;
}

#alert.show {
  animation: slideIn 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
}

#alert.hide {
  animation: slideOut 0.4s ease-in forwards;
}

@keyframes slideIn {
  to { transform: translateY(0); opacity: 1; }
}

@keyframes slideOut {
  to { transform: translateY(200px); opacity: 0; }
}

.icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #2039D4;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.content { flex: 1; min-width: 0; }

.row1 {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 4px;
}

#donorName {
  font-family: 'Oswald', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: #ffffff;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 300px;
}

#donorAmount {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: #F5A800;
  letter-spacing: 0.05em;
  flex-shrink: 0;
  margin-left: 12px;
}

#donorMessage {
  font-family: sans-serif;
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.progressbar {
  position: absolute;
  bottom: 12px;
  left: 12px;
  right: 12px;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}

#progress {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, #2039D4, #F5A800);
  transform-origin: left;
}
</style>
</head>
<body>

<div id="alert">
  <div class="icon">💙</div>
  <div class="content">
    <div class="row1">
      <span id="donorName">Анонім</span>
      <span id="donorAmount">₴100</span>
    </div>
    <div id="donorMessage">Дякую за стрім!</div>
  </div>
  <div class="progressbar">
    <div id="progress"></div>
  </div>
</div>

<script>
const SERVER = 'https://bunt-donate-production.up.railway.app';
const DURATION = 7000;

let queue = [];
let busy = false;

function show(data) {
  queue.push(data);
  if (!busy) next();
}

function next() {
  if (!queue.length) { busy = false; return; }
  busy = true;

  const d = queue.shift();
  const el = document.getElementById('alert');
  const bar = document.getElementById('progress');

  document.getElementById('donorName').textContent = d.name || 'Анонім';
  document.getElementById('donorAmount').textContent = '₴' + d.amount;
  document.getElementById('donorMessage').textContent = d.message || '💙';

  // Reset
  el.className = '';
  el.style.transform = 'translateY(200px)';
  el.style.opacity = '0';
  bar.style.transition = 'none';
  bar.style.transform = 'scaleX(1)';

  // Play sound
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}

  // Show
  void el.offsetWidth;
  el.classList.add('show');

  // Progress bar
  setTimeout(() => {
    bar.style.transition = 'transform ' + DURATION + 'ms linear';
    bar.style.transform = 'scaleX(0)';
  }, 100);

  // Hide
  setTimeout(() => {
    el.classList.remove('show');
    el.classList.add('hide');
    setTimeout(next, 500);
  }, DURATION);
}

// SSE connection
function connect() {
  const es = new EventSource(SERVER + '/events');
  es.onopen = () => console.log('SSE connected');
  es.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'donation') show(d);
    } catch(err) {}
  };
  es.onerror = () => {
    es.close();
    setTimeout(connect, 3000);
  };
}

connect();
</script>
</body>
</html>
